<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="What I'm working on now">
    <title>Now - Aakash Haldankar</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layouts.css">
    <link rel="stylesheet" href="css/animations.css">

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Markdown parser and sanitizer -->
    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>
    <!-- Header / Navigation -->
    <header class="header">
        <nav class="nav container">
            <a href="index.html" class="logo">aakashaldankar</a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="now.html" class="nav-link active">Now</a></li>
                <li><a href="blogs.html" class="nav-link">Blogs</a></li>
                <li><a href="projects.html" class="nav-link">Projects</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="mailto:aakashaldankar@gmail.com" class="nav-link">Contact</a></li>
                <li>
                    <button class="theme-toggle" aria-label="Toggle theme">
                        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </li>
            </ul>
            <button class="mobile-menu-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <!-- Now Section -->
    <section class="now-section">
        <div class="now-header">
            <h1 class="now-title">Now</h1>
            <p class="now-updated" id="now-updated">Loading...</p>
        </div>

        <div id="now-content">
            <!-- Content loaded from content/now.md -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 All rights reserved.</p>
            <div class="footer-links">
                <a href="about.html">About</a>
                <a href="mailto:aakashaldankar@gmail.com">Contact</a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/theme-toggle.js"></script>
    <script src="js/animations.js"></script>
    <script>
        fetch('content/now.md')
            .then(r => r.text())
            .then(text => {
                marked.setOptions({ gfm: true, breaks: false });
                const rawHtml = marked.parse(text);
                document.getElementById('now-content').innerHTML = DOMPurify.sanitize(rawHtml, {
                    ADD_TAGS: ['iframe'],
                    ADD_ATTR: ['allowfullscreen', 'frameborder', 'allow', 'src', 'title', 'loading']
                });
            })
            .catch(() => {
                document.getElementById('now-content').innerHTML = '<p>Could not load content.</p>';
            });

        fetch('content/now.json')
            .then(r => r.json())
            .then(data => {
                if (data.updated) {
                    document.getElementById('now-updated').textContent = 'Last updated: ' + data.updated;
                }
            })
            .catch(() => {});
    </script>
</body>
</html>
